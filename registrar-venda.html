<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrar Venda</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808;
    --surface: #111111;
    --border: #2a2416;
    --accent: #C9A84C;
    --accent2: #E8C97A;
    --text: #F0EAD6;
    --muted: #6B5F40;
    --danger: #ff4d6d;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 16px 80px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .wrapper {
    width: 100%; max-width: 520px;
    position: relative; z-index: 1;
  }
  /* Loading */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .loading-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Error */
  .error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 12px;
    text-align: center;
  }
  .error-icon { font-size: 48px; }
  .error-title { font-size: 20px; font-weight: 700; }
  .error-sub { color: var(--muted); font-family: var(--mono); font-size: 12px; }
  /* Main content */
  .main-content { display: none; }
  /* Header */
  .header { margin-bottom: 40px; text-align: left; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .badge span {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  .header h1 {
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }
  .header h1 em { font-style: normal; color: var(--accent); }
  .header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    font-family: var(--mono);
  }
  .company-name {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--accent);
    margin-bottom: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  /* Fields */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 7px;
  }
  .field label .req { color: var(--accent); margin-left: 3px; }
  .field label .hint {
    font-weight: 400;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    margin-left: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }
  .field input::placeholder { color: var(--muted); }
  .field select option { background: #1a1a1a; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  /* Button */
  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.15s, box-shadow 0.2s;
    margin-top: 8px;
  }
  .btn-submit:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.35);
  }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-submit .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  /* Toast */
  .toast {
    display: none;
    padding: 16px 18px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    margin-top: 16px;
  }
  .toast.success {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--accent2);
  }
  .toast.error {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.3);
    color: #ff8099;
  }
  .toast strong { display: block; font-size: 14px; margin-bottom: 4px; }
  /* Log */
  .log-section { margin-top: 8px; }
  .log-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .log-list { list-style: none; }
  .log-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .log-item:last-child { border-bottom: none; }
  .log-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }
  .log-item.ok .dot { background: var(--accent); }
  .log-item.fail .dot { background: var(--danger); }
  .log-item .phone { font-size: 14px; font-weight: 600; }
  .log-item .meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .empty-log { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 16px 0; }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Loading -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-ring"></div>
    <span>Carregando configurações...</span>
  </div>

  <!-- Error -->
  <div class="error-screen" id="errorScreen">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Link inválido</div>
    <div class="error-sub">Este link não está configurado.<br>Entre em contato com a agência.</div>
  </div>

  <!-- Main -->
  <div class="main-content" id="mainContent">
    <div class="header">
      <div class="company-name" id="companyName"></div>
      <div class="badge"><span></span> Conversions API</div>
      <h1>Registrar<br><em>Venda</em></h1>
      <p>Envia o evento Purchase direto<br>pro Facebook com dados do comprador.</p>
    </div>

    <div class="card">
      <div class="card-title">📱 Dados do Comprador</div>
      <div class="field">
        <label>Telefone <span class="req">*</span> <span class="hint">com DDD, sem espaço ou traço</span></label>
        <input type="tel" id="phone" placeholder="11999998888" maxlength="20">
      </div>
      <div class="field">
        <label>Nome completo <span class="hint">opcional</span></label>
        <input type="text" id="name" placeholder="João Silva">
      </div>
      <div class="field">
        <label>E-mail <span class="hint">opcional</span></label>
        <input type="email" id="email" placeholder="joao@email.com">
      </div>
      <div class="row">
        <div class="field">
          <label>Valor da venda <span class="req">*</span></label>
          <input type="number" id="value" placeholder="997" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Moeda</label>
          <select id="currency">
            <option value="BRL">BRL — Real</option>
            <option value="USD">USD — Dólar</option>
            <option value="EUR">EUR — Euro</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Produto / Oferta <span class="hint">opcional</span></label>
        <input type="text" id="product" placeholder="ex: Mentoria Premium">
      </div>
      <button class="btn-submit" id="btnSubmit" onclick="enviarVenda()">
        <span id="btnText">✓ Registrar Venda no Facebook</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>
      <div class="toast" id="toast"></div>
    </div>

    <div class="log-section">
      <div class="log-title">Últimas vendas enviadas</div>
      <ul class="log-list" id="logList">
        <li class="empty-log">Nenhuma venda registrada ainda.</li>
      </ul>
    </div>
  </div>

</div>


<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// Cole as credenciais do Firebase abaixo (mesmo valor do painel)
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAhMAelXZVF5in0-Cs4W9WjBJvx6USeUbA",
  authDomain: "projeto-trackeamento-95ef2.firebaseapp.com",
  projectId: "projeto-trackeamento-95ef2",
};

let clientConfig = null;
let db = null;

async function init() {
  const saved = localStorage.getItem("fb_firebase_config");
  const cfg = saved ? JSON.parse(saved) : FIREBASE_CONFIG;
  if (!cfg.apiKey || !cfg.projectId) { showError(); return; }
  const slug = new URLSearchParams(window.location.search).get("c");
  if (!slug) { showError(); return; }
  try {
    if (firebase.apps.length) firebase.apps.forEach(a => a.delete());
    firebase.initializeApp({
      apiKey: cfg.apiKey,
      authDomain: cfg.authDomain || cfg.projectId + ".firebaseapp.com",
      projectId: cfg.projectId,
    });
    db = firebase.firestore();
    const snap = await db.collection("clients").where("slug","==",slug).get();
    if (snap.empty) { showError(); return; }
    clientConfig = snap.docs[0].data();
    showMain();
  } catch(e) { showError(); }
}

function showMain() {
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
  document.title = "Registrar Venda · " + clientConfig.name;
  document.getElementById("companyName").textContent = clientConfig.name;
}

function showError() {
  document.getElementById("loadingScreen").style.display = "none";
  document.getElementById("errorScreen").style.display = "flex";
}

async function sha256(str) {
  const clean = str.toLowerCase().trim().replace(/\s+/g, "");
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(clean));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function normalizePhone(raw) {
  const digits = raw.replace(/\D/g, "");
  return digits.length <= 11 ? "55" + digits : digits;
}

async function enviarVenda() {
  if (!clientConfig) return;
  const phone = document.getElementById("phone").value.trim();
  const value = document.getElementById("value").value.trim();
  if (!phone) { showToast("error","Campo obrigatório","Informe o telefone do comprador."); return; }
  if (!value) { showToast("error","Campo obrigatório","Informe o valor da venda."); return; }
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const currency = document.getElementById("currency").value;
  const product  = document.getElementById("product").value.trim();
  setLoading(true);
  try {
    const phoneHash = await sha256(normalizePhone(phone));
    const userData = { ph: [phoneHash] };
    if (email) userData.em = [await sha256(email)];
    if (name) {
      const parts = name.split(" ");
      userData.fn = [await sha256(parts[0])];
      if (parts.length > 1) userData.ln = [await sha256(parts.slice(1).join(" "))];
    }
    const eventId = "venda_" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
    const payload = {
      data: [{
        event_name: "Purchase",
        event_time: Math.floor(Date.now()/1000),
        event_id: eventId,
        action_source: "other",
        user_data: userData,
        custom_data: {
          value: parseFloat(value),
          currency,
          ...(product && { content_name: product }),
          contents: [{ id: product || "venda_wpp", quantity: 1 }],
          content_type: "product"
        }
      }],
      access_token: clientConfig.token,
      ...(clientConfig.testCode && { test_event_code: clientConfig.testCode })
    };
    const url = "https://graph.facebook.com/v18.0/" + clientConfig.pixelId + "/events";
    const res = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || "Erro desconhecido");
    showToast("success","✓ Venda enviada ao Facebook!","Events received: " + (data.events_received||0) + " · ID: " + eventId);
    addLog(true, phone, value, currency, product);
    if (db) db.collection("sales").add({ clientSlug: clientConfig.slug, phone, value: parseFloat(value), currency, product, status: "ok", eventId, createdAt: Date.now() });
    limparFormulario();
  } catch(err) {
    showToast("error","Erro ao enviar", err.message);
    addLog(false, phone, value, currency, product);
    if (db) db.collection("sales").add({ clientSlug: clientConfig.slug, phone, value: parseFloat(value), currency, product, status: "fail", createdAt: Date.now() });
  }
  setLoading(false);
}

function setLoading(on) {
  const btn = document.getElementById("btnSubmit");
  btn.disabled = on;
  document.getElementById("btnText").style.display = on ? "none" : "block";
  document.getElementById("btnSpinner").style.display = on ? "block" : "none";
}

function showToast(type, title, msg) {
  const t = document.getElementById("toast");
  t.className = "toast " + type;
  t.innerHTML = "<strong>" + title + "</strong>" + (msg||"");
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 8000);
}

function addLog(ok, phone, value, currency, product) {
  const list = document.getElementById("logList");
  const empty = list.querySelector(".empty-log");
  if (empty) empty.remove();
  const time = new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  const li = document.createElement("li");
  li.className = "log-item " + (ok ? "ok" : "fail");
  li.innerHTML = `<div class="dot"></div><div class="info"><div class="phone">${phone.replace(/\D/g,"").replace(/(\d{2})(\d{5})(\d{4})/,"($1) $2-$3")}</div><div class="meta">${ok?"✓ Enviado":"✗ Falhou"} · ${currency} ${parseFloat(value).toLocaleString("pt-BR",{minimumFractionDigits:2})} · ${product||"sem produto"} · ${time}</div></div>`;
  list.prepend(li);
}

function limparFormulario() {
  ["phone","name","email","value","product"].forEach(id => document.getElementById(id).value = "");
}

init();
</script>
</body>
</html>
